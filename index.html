<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fast Paper To Text Scanner</title>
    
    <!-- Ultra Fast Tesseract & jsPDF Libraries -->
    <script src="cloudflare.com"></script>
    <script src="cloudflare.com"></script>

    <style>
        body { font-family: Arial, sans-serif; text-align: center; background-color: #f4f7f6; margin: 0; padding: 15px; }
        .container { max-width: 500px; background: white; padding: 20px; margin: 0 auto; border-radius: 10px; box-shadow: 0px 4px 10px rgba(0,0,0,0.1); }
        video { width: 100%; border-radius: 8px; background: #000; height: auto; }
        button { background-color: #007bff; color: white; border: none; padding: 12px 20px; font-size: 16px; border-radius: 5px; cursor: pointer; margin: 10px 5px; font-weight: bold; width: 90%; }
        button:hover { background-color: #0056b3; }
        .btn-success { background-color: #28a745; }
        .btn-success:disabled { background-color: #cccccc; cursor: not-allowed; }
        #output-box { width: 100%; height: 150px; margin-top: 15px; padding: 10px; border-radius: 5px; border: 1px solid #ccc; box-sizing: border-box; }
        #status { font-weight: bold; color: #ff5722; margin: 10px 0; font-size: 16px; }
    </style>
</head>
<body>

<div class="container">
    <h2>📸 Paper To Text & PDF Scanner</h2>
    
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas" style="display:none;"></canvas>
    
    <br>
    <button id="capture-btn">📷 Take Picture & Scan</button>
    
    <div id="status">Status: Ready to Scan</div>

    <h3>Extracted Text:</h3>
    <textarea id="output-box" placeholder="Your scanned text will appear here..."></textarea>
    
    <br>
    <button id="download-txt" class="btn-success" disabled>📥 Download TXT</button>
    <button id="download-pdf" class="btn-success" disabled>📄 Download PDF</button>
</div>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const captureBtn = document.getElementById('capture-btn');
    const outputBox = document.getElementById('output-box');
    const statusText = document.getElementById('status');
    const downloadTxtBtn = document.getElementById('download-txt');
    const downloadPdfBtn = document.getElementById('download-pdf');

    // Fast back camera initialization
    navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } } })
        .then(stream => { video.srcObject = stream; })
        .catch(err => { statusText.innerText = "Camera error. Check permissions!"; });

    captureBtn.addEventListener('click', () => {
        statusText.innerText = "⏳ Processing image with AI... (Takes 3-5 Sec)";
        captureBtn.disabled = true;
        outputBox.value = "";
        
        const context = canvas.getContext('2d');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        context.drawImage(video, 0, 0, canvas.width, canvas.height);
        
        const imageData = canvas.toDataURL('image/jpeg', 0.8); // Compressed for faster loading

        // Fast Tesseract Engine
        Tesseract.recognize(imageData, 'eng', { logger: m => console.log(m) })
            .then(({ data: { text } }) => {
                captureBtn.disabled = false;
                if(text.trim() === "") {
                    statusText.innerText = "❌ No clear text found! Focus properly.";
                } else {
                    outputBox.value = text;
                    statusText.innerText = "✅ Done! Text Extracted.";
                    downloadTxtBtn.disabled = false;
                    downloadPdfBtn.disabled = false;
                }
            })
            .catch(error => {
                captureBtn.disabled = false;
                statusText.innerText = "❌ Error occurred while scanning.";
            });
    });

    downloadTxtBtn.addEventListener('click', () => {
        const blob = new Blob([outputBox.value], { type: "text/plain;charset=utf-8" });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "ScannedText.txt";
        link.click();
    });

    downloadPdfBtn.addEventListener('click', () => {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const splitText = doc.splitTextToSize(outputBox.value, 180);
        doc.text(splitText, 10, 10);
        doc.save("ScannedDocument.pdf");
    });
</script>

</body>
</html>
